# Cloud Build → Cloud Run 자동 배포
# 트리거: GitHub push to main
substitutions:
  _SERVICE_NAME: ylz-crm
  _REGION: asia-northeast3
  _REPOSITORY: docker-repo

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/YLZ_CRM_SUPABASE_URL/versions/latest
      env: NEXT_PUBLIC_SUPABASE_URL
    - versionName: projects/${PROJECT_ID}/secrets/YLZ_CRM_SUPABASE_ANON_KEY/versions/latest
      env: NEXT_PUBLIC_SUPABASE_ANON_KEY

steps:
  # 1. Build Docker image (NEXT_PUBLIC_* injected from Secret Manager at build time)
  - name: "gcr.io/cloud-builders/docker"
    secretEnv:
      - NEXT_PUBLIC_SUPABASE_URL
      - NEXT_PUBLIC_SUPABASE_ANON_KEY
    args:
      - "build"
      - "--build-arg"
      - "NEXT_PUBLIC_SUPABASE_URL=$$NEXT_PUBLIC_SUPABASE_URL"
      - "--build-arg"
      - "NEXT_PUBLIC_SUPABASE_ANON_KEY=$$NEXT_PUBLIC_SUPABASE_ANON_KEY"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${COMMIT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest"
      - "."

  # 2. Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}"

  # 3. Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${COMMIT_SHA}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "3"
      - "--set-secrets"
      - "NEXT_PUBLIC_SUPABASE_URL=YLZ_CRM_SUPABASE_URL:latest,NEXT_PUBLIC_SUPABASE_ANON_KEY=YLZ_CRM_SUPABASE_ANON_KEY:latest"

options:
  logging: CLOUD_LOGGING_ONLY
